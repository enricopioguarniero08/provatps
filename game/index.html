<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Acchiappa la Foto</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#222;
    color:white;
}

#game{
    width:700px;
    height:450px;
    margin:20px auto;
    background:#111;
    border:3px solid white;
    position:relative;
    overflow:hidden;
}

#target{
    width:120px;
    position:absolute;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🎯 Acchiappa la Foto</h1>
<p>Punti: <span id="score">0</span></p>

<div id="game">
<img id="target" src="foto.jpeg">
</div>

<script>

let score = 0

const target = document.getElementById("target")
const game = document.getElementById("game")

function move(){

    const maxX = game.clientWidth - target.clientWidth
    const maxY = game.clientHeight - target.clientHeight

    const x = Math.random() * maxX
    const y = Math.random() * maxY

    target.style.left = x + "px"
    target.style.top = y + "px"
}

target.onclick = function(){

    score++
    document.getElementById("score").innerText = score

    move()
}

setInterval(move,1000)

move()

</script>

</body>
</html>
